<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e30;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="url(#bg)"/>

  <!-- Card 1: Feeder -->
  <rect x="20" y="20" width="175" height="360" rx="12" fill="url(#card)" stroke="#3498db" stroke-width="1" opacity="0.9"/>
  <circle cx="50" cy="55" r="18" fill="#2c3e50"/>
  <text x="50" y="60" text-anchor="middle" fill="#3498db" font-size="18">🍽</text>
  <text x="75" y="52" fill="#ecf0f1" font-size="11" font-family="sans-serif" font-weight="600">Smart Feeder</text>
  <circle cx="170" cy="48" r="5" fill="#2ecc71"/>
  <text x="75" y="66" fill="#7f8c8d" font-size="9" font-family="sans-serif">Air Smart Feeder</text>

  <rect x="32" y="82" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="36" y="96" fill="#7f8c8d" font-size="8" font-family="sans-serif">Battery</text>
  <text x="36" y="116" fill="#2ecc71" font-size="14" font-family="sans-serif" font-weight="600">87%</text>

  <rect x="108" y="82" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="112" y="96" fill="#7f8c8d" font-size="8" font-family="sans-serif">Food</text>
  <text x="112" y="116" fill="#2ecc71" font-size="14" font-family="sans-serif" font-weight="600">OK</text>

  <rect x="32" y="134" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="36" y="148" fill="#7f8c8d" font-size="8" font-family="sans-serif">Fed Today</text>
  <text x="36" y="168" fill="#ecf0f1" font-size="14" font-family="sans-serif" font-weight="600">45g (3x)</text>

  <rect x="108" y="134" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="112" y="148" fill="#7f8c8d" font-size="8" font-family="sans-serif">Next Feed</text>
  <text x="112" y="168" fill="#ecf0f1" font-size="14" font-family="sans-serif" font-weight="600">18:00</text>

  <rect x="40" y="200" width="115" height="30" rx="8" fill="#3498db"/>
  <text x="97" y="220" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="600">🍖 Feed Now</text>

  <!-- Card 2: Fountain -->
  <rect x="212" y="20" width="175" height="360" rx="12" fill="url(#card)" stroke="#3498db" stroke-width="1" opacity="0.9"/>
  <circle cx="242" cy="55" r="18" fill="#2c3e50"/>
  <text x="242" y="60" text-anchor="middle" fill="#3498db" font-size="18">💧</text>
  <text x="267" y="52" fill="#ecf0f1" font-size="11" font-family="sans-serif" font-weight="600">Fountain</text>
  <circle cx="362" cy="48" r="5" fill="#2ecc71"/>
  <text x="267" y="66" fill="#7f8c8d" font-size="9" font-family="sans-serif">Dockstream 2</text>

  <rect x="224" y="82" width="150" height="44" rx="6" fill="#1a1a2e"/>
  <text x="228" y="96" fill="#7f8c8d" font-size="8" font-family="sans-serif">Water Level</text>
  <text x="228" y="116" fill="#3498db" font-size="14" font-family="sans-serif" font-weight="600">72%</text>
  <rect x="280" y="110" width="86" height="4" rx="2" fill="#1a1a2e" stroke="#2c3e50" stroke-width="0.5"/>
  <rect x="280" y="110" width="62" height="4" rx="2" fill="#3498db"/>

  <rect x="224" y="134" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="228" y="148" fill="#7f8c8d" font-size="8" font-family="sans-serif">Drinking</text>
  <text x="228" y="168" fill="#ecf0f1" font-size="14" font-family="sans-serif" font-weight="600">180mL</text>

  <rect x="300" y="134" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="304" y="148" fill="#7f8c8d" font-size="8" font-family="sans-serif">Filter</text>
  <text x="304" y="168" fill="#ecf0f1" font-size="14" font-family="sans-serif" font-weight="600">12 days</text>

  <!-- Card 3: Litter Box -->
  <rect x="404" y="20" width="175" height="360" rx="12" fill="url(#card)" stroke="#3498db" stroke-width="1" opacity="0.9"/>
  <circle cx="434" cy="55" r="18" fill="#2c3e50"/>
  <text x="434" y="60" text-anchor="middle" fill="#3498db" font-size="18">🐱</text>
  <text x="459" y="52" fill="#ecf0f1" font-size="11" font-family="sans-serif" font-weight="600">Litter Box</text>
  <circle cx="554" cy="48" r="5" fill="#2ecc71"/>
  <text x="459" y="66" fill="#7f8c8d" font-size="9" font-family="sans-serif">Luma Smart</text>

  <rect x="416" y="82" width="150" height="44" rx="6" fill="#1a1a2e"/>
  <text x="420" y="96" fill="#7f8c8d" font-size="8" font-family="sans-serif">Litter Level</text>
  <text x="420" y="116" fill="#2ecc71" font-size="14" font-family="sans-serif" font-weight="600">65%</text>
  <rect x="472" y="110" width="86" height="4" rx="2" fill="#1a1a2e" stroke="#2c3e50" stroke-width="0.5"/>
  <rect x="472" y="110" width="56" height="4" rx="2" fill="#2ecc71"/>

  <rect x="416" y="134" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="420" y="148" fill="#7f8c8d" font-size="8" font-family="sans-serif">Waste Bin</text>
  <text x="420" y="168" fill="#2ecc71" font-size="14" font-family="sans-serif" font-weight="600">OK</text>

  <rect x="492" y="134" width="68" height="44" rx="6" fill="#1a1a2e"/>
  <text x="496" y="148" fill="#7f8c8d" font-size="8" font-family="sans-serif">Status</text>
  <text x="496" y="168" fill="#ecf0f1" font-size="14" font-family="sans-serif" font-weight="600">Idle</text>

  <rect x="424" y="200" width="72" height="30" rx="8" fill="#3498db"/>
  <text x="460" y="220" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif" font-weight="600">Clean</text>
  <rect x="504" y="200" width="60" height="30" rx="8" fill="#2a2a3e" stroke="#7f8c8d" stroke-width="0.5"/>
  <text x="534" y="220" text-anchor="middle" fill="#bdc3c7" font-size="11" font-family="sans-serif">Stop</text>
</svg>
